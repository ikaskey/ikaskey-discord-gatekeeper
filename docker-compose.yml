# Docker での常駐運用（PostgreSQL 版）。web は 127.0.0.1:3001 で待ち受けるので、
# 任意のリバースプロキシ/トンネルで公開し PUBLIC_BASE_URL を一致させること。
# 各サービスは .env の値を env_file で受け取る（DATABASE_URL 等は下で上書き）。
#
# 本番更新（GitHub ビルド済みイメージを利用・推奨）:
#   docker compose pull && docker compose up -d
# ローカルでビルドする場合:
#   docker compose up -d --build
#
# IMAGE_TAG で取得タグを切替可能（既定 latest）。例: IMAGE_TAG=sha-xxxx
services:
  # PostgreSQL（web/bot/migrate が共有）
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-gatekeeper}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-gatekeeper}
      - POSTGRES_DB=${POSTGRES_DB:-gatekeeper}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gatekeeper} -d ${POSTGRES_DB:-gatekeeper}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # 起動前にマイグレーションを適用する一時ジョブ
  migrate:
    image: ghcr.io/ikaskey/ikaskey-discord-gatekeeper-migrate:${IMAGE_TAG:-latest}
    build:
      context: .
      target: migrate
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-gatekeeper}:${POSTGRES_PASSWORD:-gatekeeper}@postgres:5432/${POSTGRES_DB:-gatekeeper}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  web:
    image: ghcr.io/ikaskey/ikaskey-discord-gatekeeper-web:${IMAGE_TAG:-latest}
    build:
      context: .
      target: web
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-gatekeeper}:${POSTGRES_PASSWORD:-gatekeeper}@postgres:5432/${POSTGRES_DB:-gatekeeper}?schema=public
      - WEB_PORT=3001
    ports:
      - "127.0.0.1:3001:3001"

  bot:
    image: ghcr.io/ikaskey/ikaskey-discord-gatekeeper-bot:${IMAGE_TAG:-latest}
    build:
      context: .
      target: bot
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-gatekeeper}:${POSTGRES_PASSWORD:-gatekeeper}@postgres:5432/${POSTGRES_DB:-gatekeeper}?schema=public

volumes:
  pgdata:
