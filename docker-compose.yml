# Docker での常駐運用。web は 127.0.0.1:3001 で待ち受けるので、
# 任意のリバースプロキシ/トンネルで公開し PUBLIC_BASE_URL を一致させること。
# 各サービスは .env の値を env_file で受け取る（DATABASE_URL 等は下で上書き）。
services:
  # 起動前にマイグレーションを適用する一時ジョブ
  migrate:
    build:
      context: .
      target: migrate
    environment:
      - DATABASE_URL=file:/data/prod.db
    volumes:
      - ./data:/data
    restart: "no"

  web:
    build:
      context: .
      target: web
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/data/prod.db
      - WEB_PORT=3001
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - ./data:/data

  bot:
    build:
      context: .
      target: bot
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/data/prod.db
    volumes:
      - ./data:/data
