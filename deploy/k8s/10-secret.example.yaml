# これはテンプレート。実値を入れて `secret.yaml` として保存し `kubectl apply` する。
# secret.yaml は .gitignore 済み（実シークレットはコミットしない）。
#   cp deploy/k8s/10-secret.example.yaml deploy/k8s/secret.yaml  # 値を埋める
#   kubectl apply -f deploy/k8s/secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: gatekeeper-secret
  namespace: ikaskey-gatekeeper
type: Opaque
stringData:
  # ----- PostgreSQL（postgres と app の双方が参照）-----
  POSTGRES_USER: gatekeeper
  POSTGRES_PASSWORD: "CHANGE_ME_strong_password"
  POSTGRES_DB: gatekeeper
  # app からの接続。host はクラスタ内 Service 名 `postgres`
  DATABASE_URL: "postgresql://gatekeeper:CHANGE_ME_strong_password@postgres:5432/gatekeeper?schema=public"

  # ----- Discord -----
  DISCORD_TOKEN: "CHANGE_ME"
  DISCORD_CLIENT_ID: "CHANGE_ME"
  DISCORD_GUILD_ID: "CHANGE_ME"
  VERIFIED_ROLE_ID: "CHANGE_ME"
  DISCORD_CLIENT_SECRET: "CHANGE_ME" # 自動参加(M6)を使う場合
  # DISCORD_SERVER_URL: "https://discord.com/channels/<guildId>"

  # ----- Misskey -----
  MISSKEY_HOST: "ikaskey.bktsk.com"
  MISSKEY_APP_NAME: "いかすきーDiscord認証"
  MISSKEY_MODERATOR_ROLE_ID: ""
  MISSKEY_ADMIN_ROLE_ID: ""

  # ----- Web / 管理画面 -----
  PUBLIC_BASE_URL: "https://ikaskey-discord.bktsk.com"
  ADMIN_COOKIE_SECRET: "CHANGE_ME_64_hex"

  # ----- 退会連動 / 移行（移行期間中は false 推奨）-----
  SWEEP_ENABLED: "false"
  MIGRATION_PURGE_ENABLED: "false"

  # ----- ブランディング（任意）-----
  BRAND_FAVICON_URL: ""
  BRAND_OG_IMAGE_URL: ""
  BRAND_THEME_COLOR: "#86b300"
