# bot（discord.js 常駐）。Discord Gateway は単一インスタンス前提のため replicas は必ず 1。
# strategy: Recreate でローリング中に bot が二重起動しないようにする
# （二重起動するとイベント二重処理・スイープ二重実行になる）。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bot
  namespace: ikaskey-gatekeeper
  annotations:
    keel.sh/policy: force
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 2m"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: bot
  template:
    metadata:
      labels:
        app: bot
    spec:
      # 起動前にスキーマ移行を適用（web と同時でも advisory lock で直列化され安全）。
      initContainers:
        - name: migrate
          image: ghcr.io/ikaskey/ikaskey-discord-gatekeeper-migrate:latest
          imagePullPolicy: Always
          command: ["pnpm", "exec", "prisma", "migrate", "deploy"]
          envFrom:
            - secretRef:
                name: gatekeeper-secret
      containers:
        - name: bot
          image: ghcr.io/ikaskey/ikaskey-discord-gatekeeper-bot:latest
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: gatekeeper-secret
          env:
            - name: NODE_ENV
              value: production
