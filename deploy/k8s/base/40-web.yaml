# web（Hono）。ステートレスなので複数 replica に水平スケール可能。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: ikaskey-gatekeeper
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: ghcr.io/ikaskey/ikaskey-discord-gatekeeper-web:latest
          ports:
            - containerPort: 3001
          envFrom:
            - secretRef:
                name: gatekeeper-secret
          env:
            - name: NODE_ENV
              value: production
            - name: WEB_PORT
              value: "3001"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: ikaskey-gatekeeper
spec:
  selector:
    app: web
  ports:
    - port: 3001
      targetPort: 3001
---
# Traefik(k3s 同梱) で公開する場合の Ingress。
# cloudflared トンネルを使う場合はこの Ingress は不要で、トンネルの service を
# http://web.ikaskey-gatekeeper.svc.cluster.local:3001 に向ければよい。
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web
  namespace: ikaskey-gatekeeper
spec:
  rules:
    - host: ikaskey-discord.bktsk.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 3001
